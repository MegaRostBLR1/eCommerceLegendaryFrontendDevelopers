version: "3.5"

services:
  nginx_tandem_dev:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: nginx_tandem_dev
    restart: always
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./build:/var/www/html
    networks:
      - main
networks:
  main:
